# ─────────────────────────────────────────────────────────────────────────────
#  nginx.conf — TLS termination + rate limiting for SPY Quant dashboard
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  1;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"              always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header X-XSS-Protection          "1; mode=block"     always;
    add_header Referrer-Policy           "no-referrer"       always;
    add_header Content-Security-Policy   "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # Hide nginx version
    server_tokens off;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # 10 requests/second per IP — plenty for the dashboard refresh (30s)
    limit_req_zone $binary_remote_addr zone=dashboard:10m rate=10r/s;
    # API endpoints: stricter
    limit_req_zone $binary_remote_addr zone=api:10m rate=2r/s;

    # ── Connection limits ─────────────────────────────────────────────────────
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 30;
    client_max_body_size 1m;    # no file uploads needed

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS server ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # ── TLS certificates ──────────────────────────────────────────────────
        # Self-signed cert for now — replace with Let's Encrypt cert in prod
        # To generate: openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
        #   -keyout /opt/spy_quant/deployment/ssl/server.key \
        #   -out /opt/spy_quant/deployment/ssl/server.crt \
        #   -subj "/CN=spy-quant"
        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        # TLS hardening — TLS 1.2+ only, strong ciphers
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # HSTS — tells browsers to only use HTTPS for 1 year
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── IP allowlist (optional — uncomment and add your IP) ───────────────
        # allow YOUR.HOME.IP.ADDRESS;
        # deny all;

        # ── Dashboard proxy ───────────────────────────────────────────────────
        location / {
            limit_req zone=dashboard burst=20 nodelay;
            limit_conn addr 10;
            proxy_pass         http://dashboard:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # API endpoints — stricter rate limit
        location /api/ {
            limit_req zone=api burst=5 nodelay;
            limit_conn addr 5;
            proxy_pass         http://dashboard:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 15s;
        }

        # Health check — no rate limit needed
        location /health {
            proxy_pass http://dashboard:8080/health;
            access_log off;
        }

        # Block common attack paths
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
        location ~ \.(env|git|sh|py|json)$ {
            deny all;
            access_log off;
        }
    }
}
