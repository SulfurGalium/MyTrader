# Remove deprecated version field — docker compose v2+ ignores it anyway

# ─────────────────────────────────────────────────────────────────────────────
#  SPY Quant — Hardened Production Docker Compose
# ─────────────────────────────────────────────────────────────────────────────

x-security: &security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add:
    - NET_BIND_SERVICE
  user: "1001:1001"

x-logging: &logging
  logging:
    driver: "json-file"
    options:
      max-size: "50m"
      max-file: "5"

services:

  # ── Trading loop ──────────────────────────────────────────────────────────
  trading:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    image: spy-quant:latest
    container_name: spy_quant_trading
    restart: unless-stopped
    <<: *security
    <<: *logging
    env_file:
      - ../.env
    environment:
      - DEVICE=cpu
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - ../models:/app/models
      - ../cache:/app/cache
      - ../logs:/app/logs
      - ../backups:/app/backups
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 128m
    command: ["python", "scripts/run_live.py"]
    networks:
      - spy_internal
    mem_limit: 2g
    memswap_limit: 2g
    cpus: "1.5"
    pids_limit: 100

  # ── Dashboard ─────────────────────────────────────────────────────────────
  dashboard:
    image: spy-quant:latest
    container_name: spy_quant_dashboard
    restart: unless-stopped
    <<: *security
    <<: *logging
    env_file:
      - ../.env
    environment:
      - DEVICE=cpu
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - ../models:/app/models:ro
      - ../cache:/app/cache:ro
      - ../logs:/app/logs:ro
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 32m
    command: ["python", "-m", "dashboard.server"]
    depends_on:
      - trading
    networks:
      - spy_internal
      - spy_external
    mem_limit: 512m
    memswap_limit: 512m
    cpus: "0.5"
    pids_limit: 50

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: spy_quant_nginx
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # SSL certificates — generated during setup (Step 5 in DEPLOY.md)
      - ./ssl:/etc/nginx/ssl:ro
      - type: tmpfs
        target: /var/cache/nginx
        tmpfs:
          size: 64m
      - type: tmpfs
        target: /var/run
        tmpfs:
          size: 8m
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 16m
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - dashboard
    networks:
      - spy_external
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    mem_limit: 128m
    cpus: "0.25"

networks:
  spy_internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.0.0/24

  spy_external:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24
